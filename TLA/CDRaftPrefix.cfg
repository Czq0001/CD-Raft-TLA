\* Prefix Fast Return configuration.
\* Explores k1/k2/k3-style cases where a later Fast Return certificate can
\* prove and commit the whole current prefix.

SPECIFICATION Spec

CONSTANTS
    Domains      = {d1, d2}
    GlobalDomain = d1
    RequestIDs   = {r1, r2, r3}
    Keys         = {k1}
    Values       = {v1, v2, v3}
    NoVal        = NoVal
    NoReq        = NoReq
    MaxLogLen    = 3
    MaxTerm      = 2

INVARIANT TypeInv
INVARIANT CommitMonotone
INVARIANT PendingFRWellFormed
INVARIANT IndexOrderingInvariant

INVARIANT FastReturnSafety
INVARIANT FastReturnAgreesWithCommit
INVARIANT DualIndexReadSafety
INVARIANT StateMachineCoherent
