\* Three-domain Prefix Fast Return configuration.
\* Checks that GL domain plus any one remote domain can prove and commit a
\* k1/k2/k3-style prefix without requiring every domain to hold the prefix.

SPECIFICATION Spec

CONSTANTS
    Domains      = {d1, d2, d3}
    GlobalDomain = d1
    RequestIDs   = {r1, r2, r3}
    Keys         = {k1}
    Values       = {v1}
    NoVal        = NoVal
    NoReq        = NoReq
    MaxLogLen    = 3
    MaxTerm      = 2

INVARIANT TypeInv
INVARIANT CommitMonotone
INVARIANT PendingFRWellFormed
INVARIANT IndexOrderingInvariant

INVARIANT FastReturnSafety
INVARIANT FastReturnAgreesWithCommit
INVARIANT DualIndexReadSafety
INVARIANT StateMachineCoherent
