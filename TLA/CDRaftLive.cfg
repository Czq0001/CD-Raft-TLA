\* Liveness configuration with weak fairness.

SPECIFICATION LiveSpec

CONSTANTS
    Domains      = {d1, d2}
    GlobalDomain = d1
    RequestIDs   = {r1, r2}
    Keys         = {k1}
    Values       = {v1, v2}
    NoVal        = NoVal
    NoReq        = NoReq
    MaxLogLen    = 2
    MaxTerm      = 2

INVARIANT TypeInv
INVARIANT CommitMonotone
INVARIANT FastReturnSafety
INVARIANT FastReturnAgreesWithCommit
INVARIANT DualIndexReadSafety
INVARIANT IndexOrderingInvariant

PROPERTY FastReturnEventuallyCommits
PROPERTY FastReturnEventuallyApplied
