\* Election safety with two domains, three replicas per domain.
\* The global quorum threshold is max(2, N-1), so N=2 requires 2-of-2 domains.
CONSTANTS
    Domains = {"A", "B"}
    Servers = {"a1", "a2", "a3", "b1", "b2", "b3"}
    MaxDTerm = 2
    MaxGTerm = 1
    PerDomainOnce = TRUE

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT DomainLeaderUniqueness
INVARIANT OneGlobalVotePerDomainPerTerm
INVARIANT GlobalLeaderUniqueness
